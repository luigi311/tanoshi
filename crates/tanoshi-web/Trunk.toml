[[proxy]]
backend = "http://localhost:3030/graphql"

[[proxy]]
backend = "ws://localhost:3030/ws"
ws = true

[[proxy]]
backend = "http://localhost:3030/image"

[tools]
sass = "1.93.2"
# must match the wasm-bindgen crate version in Cargo.lock
wasm_bindgen = "0.2.126"
wasm_opt = "version_130"

[serve]
addresses = ["0.0.0.0"]
